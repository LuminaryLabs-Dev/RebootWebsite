name: Deploy RebootWebsite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RebootWebsite
        uses: actions/checkout@v4

      - name: Checkout RebootSoftware
        uses: actions/checkout@v4
        with:
          repository: LuminaryLabs-Dev/RebootSoftware
          path: .source/RebootSoftware
          token: ${{ secrets.REBOOT_SOFTWARE_TOKEN || github.token }}

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install wrapper dependencies
        run: npm install

      - name: Build static site
        run: REBOOT_PUBLISH_TARGET=v6 npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
